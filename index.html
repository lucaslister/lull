<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#241B3D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lull">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>Lull</title>
<style>
  :root{--ember:#F6A75A;--text:#F3E9DD;--muted:#B09C8D;--surface:rgba(28,19,46,.55)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;min-height:100dvh;position:relative;overflow:hidden;
    padding:env(safe-area-inset-top) 22px env(safe-area-inset-bottom);user-select:none;background:#0E0A1C;
    transition:filter .8s ease}

  /* ---------- Evening Glow scene ---------- */
  .scene{position:fixed;inset:0;z-index:0;transition:opacity 1.2s ease}
  .sky{position:absolute;inset:0;background:linear-gradient(180deg,
      #241B3D 0%,#3A2349 26%,#6E3357 46%,#B14C49 60%,#DD6F38 68%,#F2A047 75%,#F8B855 79%)}
  .fell{position:absolute;left:0;right:0;width:100%}
  .fell.back{bottom:21%;opacity:.85}
  .fell.front{bottom:21%}
  .water{position:absolute;left:0;right:0;bottom:0;height:21%;overflow:hidden;
    background:linear-gradient(180deg,#C56A38 0%,#7A3B4A 16%,#34203F 46%,#150E26 100%)}
  .shimmer{position:absolute;left:50%;top:0;bottom:0;width:60px;transform:translateX(-50%);
    background:linear-gradient(180deg,rgba(255,222,150,.75),rgba(246,167,90,.12) 60%,transparent);
    filter:blur(7px);animation:shimmer 5.5s ease-in-out infinite}
  @keyframes shimmer{0%,100%{opacity:.55;width:54px}50%{opacity:.9;width:74px}}

  /* ---------- Focus mode: full-screen pastel colour orbs, no UI ---------- */
  #focus{position:fixed;inset:0;z-index:8;background:#070611;opacity:0;pointer-events:none;transition:opacity 1s ease}
  body.focus #focus{opacity:1;pointer-events:auto;cursor:pointer}
  .focus-hint{position:fixed;left:0;right:0;bottom:46px;text-align:center;z-index:9;
    font-size:13px;letter-spacing:.06em;color:rgba(255,255,255,.85);text-shadow:0 1px 8px rgba(0,0,0,.6);
    opacity:0;transition:opacity .6s ease;pointer-events:none}
  body.focus .focus-hint{opacity:.9}
  body.focus.hidehint .focus-hint{opacity:0}

  /* ---------- Orb / sun / play ---------- */
  .stage{flex:1;display:flex;justify-content:center;width:100%;position:relative;z-index:2;
    pointer-events:none;align-items:flex-start;padding-top:46vh;transition:padding-top .9s ease}
  .orb-wrap{position:relative;width:min(46vw,180px);aspect-ratio:1;pointer-events:auto;transition:width .9s ease}
  .orb{position:absolute;inset:0;border-radius:50%;cursor:pointer;
    background:radial-gradient(circle at 50% 45%,#FFE9BE 0%,#FBC264 42%,#F39B3C 72%,#E07A2E 100%);
    box-shadow:0 0 70px 18px rgba(251,190,98,.45),0 0 160px 60px rgba(240,120,50,.22);
    display:flex;align-items:center;justify-content:center;transition:background 1s ease,box-shadow 1.2s ease}
  .orb .glyph{width:0;height:0;border-left:26px solid rgba(60,30,10,.78);
    border-top:17px solid transparent;border-bottom:17px solid transparent;margin-left:7px}
  .orb .bars{display:none;gap:8px}
  .orb .bars span{width:6px;height:30px;border-radius:4px;background:rgba(60,30,10,.78)}
  body.playing .orb{animation:breathe 7s ease-in-out infinite}
  body.playing .orb .glyph{display:none}
  body.playing .orb .bars{display:flex}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .orb-hint{position:absolute;left:0;right:0;bottom:-32px;text-align:center;font-size:13px;
    color:rgba(255,255,255,.8);letter-spacing:.04em;text-shadow:0 1px 6px rgba(0,0,0,.5);transition:opacity .4s ease}
  body.playing .orb-hint{opacity:0}

  /* ---------- chrome ---------- */
  header{padding-top:30px;text-align:center;z-index:3;position:relative}
  .mark{font-size:13px;letter-spacing:.46em;text-transform:uppercase;font-weight:600;padding-left:.46em;
    color:rgba(255,255,255,.9);text-shadow:0 1px 10px rgba(0,0,0,.45)}

  .panel{width:100%;max-width:440px;z-index:3;position:relative;padding-bottom:26px}
  .panel::before{content:"";position:absolute;left:-40px;right:-40px;bottom:-30px;top:-50px;z-index:-1;
    background:linear-gradient(180deg,transparent,rgba(8,6,16,.55) 38%,rgba(8,6,16,.85));pointer-events:none}
  .row-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin:0 2px 11px;font-weight:600}

  .sounds{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:24px}
  .sound{background:var(--surface);border:1px solid rgba(255,255,255,.08);color:var(--muted);border-radius:15px;
    padding:14px 4px 11px;font-size:13px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;gap:7px;backdrop-filter:blur(8px);transition:all .25s ease}
  .sound .ic{font-size:18px;line-height:1}
  .sound.active{border-color:var(--ember);color:var(--text);background:linear-gradient(180deg,rgba(246,167,90,.2),rgba(246,167,90,.05))}

  .vol{display:flex;align-items:center;gap:14px;margin-bottom:24px}
  .vol .ic{font-size:16px;color:var(--muted);width:18px;text-align:center}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:6px;border-radius:99px;background:rgba(255,255,255,.14);outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:25px;height:25px;border-radius:50%;background:var(--ember);border:4px solid rgba(14,10,28,.9);box-shadow:0 0 14px rgba(246,167,90,.55);cursor:pointer}
  input[type=range]::-moz-range-thumb{width:21px;height:21px;border-radius:50%;background:var(--ember);border:4px solid rgba(14,10,28,.9);box-shadow:0 0 14px rgba(246,167,90,.55);cursor:pointer}

  .timers{display:flex;gap:8px}
  .timer{flex:1;background:var(--surface);border:1px solid rgba(255,255,255,.08);color:var(--muted);border-radius:13px;
    padding:11px 2px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;backdrop-filter:blur(8px);transition:all .25s ease}
  .timer.active{border-color:var(--ember);color:var(--text);background:rgba(246,167,90,.12)}
  .timer .left{display:block;font-size:11px;color:var(--ember);margin-top:3px;font-variant-numeric:tabular-nums}

  .corner{position:fixed;top:calc(env(safe-area-inset-top) + 18px);width:42px;height:42px;border-radius:50%;
    border:1px solid rgba(255,255,255,.14);background:rgba(20,14,34,.5);backdrop-filter:blur(8px);color:rgba(255,255,255,.78);
    font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5;
    transition:opacity .4s ease,color .3s ease,border-color .3s ease}
  .glowbtn{left:20px}
  .glowbtn.on{color:#BFD6FF;border-color:#BFD6FF}
  .moon{right:20px}

  body.focus .scene,body.focus .panel,body.focus header,body.focus .corner,body.focus .orb-hint,body.focus .stage{opacity:0;pointer-events:none}
  body.dim{filter:brightness(.1) saturate(.8)}
  body.dim .panel,body.dim header,body.dim .corner,body.dim .orb-hint{opacity:0;pointer-events:none}
  body.dim .stage{pointer-events:auto;cursor:pointer}
  .dim-tip{position:fixed;left:0;right:0;bottom:38px;text-align:center;font-size:12px;color:var(--muted);
    opacity:0;pointer-events:none;transition:opacity .4s ease;z-index:6}
  body.dim .dim-tip{opacity:.5;transition-delay:.5s}
</style>
</head>
<body>
  <div class="scene">
    <div class="sky"></div>
    <svg class="fell back" viewBox="0 0 1440 200" preserveAspectRatio="none" height="160">
      <path d="M0,200 L0,118 C160,92 300,150 470,110 C640,70 760,128 940,96 C1120,64 1280,120 1440,98 L1440,200 Z" fill="#2A1B38"/>
    </svg>
    <svg class="fell front" viewBox="0 0 1440 200" preserveAspectRatio="none" height="150">
      <path d="M0,200 L0,150 C180,120 340,168 520,140 C700,112 820,154 1010,128 C1200,102 1300,150 1440,134 L1440,200 Z" fill="#160F22"/>
    </svg>
    <div class="water"><div class="shimmer"></div></div>
  </div>
  <canvas id="focus"></canvas>

  <button class="corner glowbtn" id="glowbtn" aria-label="Open focus mode">✦</button>
  <button class="corner moon" id="moon" aria-label="Dim screen">☾</button>

  <header><div class="mark">Lull</div></header>

  <div class="stage" id="stage">
    <div class="orb-wrap">
      <div class="orb" id="orb" role="button" aria-label="Play or pause">
        <div class="glyph"></div>
        <div class="bars"><span></span><span></span><span></span></div>
      </div>
      <div class="orb-hint">tap to play</div>
    </div>
  </div>

  <div class="panel">
    <div class="row-label">Sound</div>
    <div class="sounds" id="sounds">
      <button class="sound active" data-type="brown"><span class="ic">▦</span>Brown</button>
      <button class="sound" data-type="pink"><span class="ic">❋</span>Pink</button>
      <button class="sound" data-type="white"><span class="ic">⬡</span>White</button>
      <button class="sound" data-type="ocean"><span class="ic">≈</span>Ocean</button>
    </div>
    <div class="vol">
      <span class="ic">◌</span>
      <input type="range" id="vol" min="0" max="100" value="55" aria-label="Volume">
      <span class="ic">●</span>
    </div>
    <div class="row-label">Sleep timer</div>
    <div class="timers" id="timers">
      <button class="timer active" data-min="0">Off</button>
      <button class="timer" data-min="15">15<span class="left" data-slot="15"></span></button>
      <button class="timer" data-min="30">30<span class="left" data-slot="30"></span></button>
      <button class="timer" data-min="45">45<span class="left" data-slot="45"></span></button>
      <button class="timer" data-min="60">60<span class="left" data-slot="60"></span></button>
    </div>
  </div>

  <div class="focus-hint">tap to exit</div>
  <div class="dim-tip">tap anywhere to wake</div>

<script>
(function(){
  let playing=false,type='brown',targetVol=0.55;
  let timerId=null,timerEnd=0,tickId=null,fadeTimer=null;

  /* ---------- noise rendered to seamless loops, played via a media element ----------
     this is what makes Android show lock-screen controls AND keeps the sound
     going with the screen off (raw Web Audio gets suspended in the background) ---- */
  const SR=44100, LOOP=20, XF=0.5;
  const labels={brown:'Brown noise',pink:'Pink noise',white:'White noise',ocean:'Ocean'};
  const urls={};
  const audioEl=new Audio(); audioEl.loop=true; audioEl.preload='auto';

  function genSamples(t,n){
    const a=new Float32Array(n);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0,lastBrown=0,lfo=0;
    const lfoInc=2*Math.PI*0.06/SR;
    for(let i=0;i<n;i++){
      const w=Math.random()*2-1;let s;
      if(t==='white'){s=w*0.34;}
      else if(t==='pink'){
        b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;
        b2=0.96900*b2+w*0.1538520;b3=0.86650*b3+w*0.3104856;
        b4=0.55000*b4+w*0.5329522;b5=-0.7616*b5-w*0.0168980;
        s=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;b6=w*0.115926;
      } else {
        lastBrown=(lastBrown+0.02*w)/1.02;s=lastBrown*3.2;
        if(t==='ocean'){lfo+=lfoInc;s*=(0.5+0.5*Math.sin(lfo));}
      }
      a[i]=s;
    }
    return a;
  }
  function makeLoop(t){
    const n=Math.floor(LOOP*SR),xf=Math.floor(XF*SR);
    const raw=genSamples(t,n+xf),out=new Float32Array(n);
    for(let i=0;i<n;i++)out[i]=raw[i];
    for(let i=0;i<xf;i++){const p=i/xf;out[i]=raw[i]*Math.sin(p*Math.PI/2)+raw[n+i]*Math.cos(p*Math.PI/2);}
    return out;
  }
  function encodeWAV(s){
    const n=s.length,buf=new ArrayBuffer(44+n*2),v=new DataView(buf);
    const w=(o,str)=>{for(let i=0;i<str.length;i++)v.setUint8(o+i,str.charCodeAt(i));};
    w(0,'RIFF');v.setUint32(4,36+n*2,true);w(8,'WAVE');w(12,'fmt ');v.setUint32(16,16,true);
    v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,SR,true);v.setUint32(28,SR*2,true);
    v.setUint16(32,2,true);v.setUint16(34,16,true);w(36,'data');v.setUint32(40,n*2,true);
    let o=44;for(let i=0;i<n;i++){let x=Math.max(-1,Math.min(1,s[i]));v.setInt16(o,x<0?x*32768:x*32767,true);o+=2;}
    return new Blob([buf],{type:'audio/wav'});
  }
  function urlFor(t){if(!urls[t])urls[t]=URL.createObjectURL(encodeWAV(makeLoop(t)));return urls[t];}

  function setSession(state){
    if(!('mediaSession' in navigator))return;
    try{
      navigator.mediaSession.metadata=new MediaMetadata({title:'Lull',artist:labels[type]||'Noise',album:'Lull',
        artwork:[{src:'icon-192.png',sizes:'192x192',type:'image/png'},{src:'icon-512.png',sizes:'512x512',type:'image/png'}]});
      navigator.mediaSession.playbackState=state;
    }catch(e){}
  }
  function start(){
    if(fadeTimer){clearInterval(fadeTimer);fadeTimer=null;}
    audioEl.src=urlFor(type);audioEl.loop=true;audioEl.volume=targetVol;
    const p=audioEl.play();if(p&&p.catch)p.catch(()=>{});
    playing=true;document.body.classList.add('playing');setSession('playing');
  }
  function stop(fade){
    if(!playing)return;
    playing=false;document.body.classList.remove('playing');setSession('paused');clearTimer();
    if(fade){
      let v=audioEl.volume;if(fadeTimer)clearInterval(fadeTimer);
      fadeTimer=setInterval(()=>{v-=0.025;if(v<=0){clearInterval(fadeTimer);fadeTimer=null;audioEl.pause();audioEl.volume=targetVol;}else audioEl.volume=Math.max(0,v);},90);
    } else {audioEl.pause();}
  }
  function toggle(){playing?stop(false):start();}

  const ORDER=['brown','pink','white','ocean'];
  function setType(t){
    type=t;
    document.querySelectorAll('.sound').forEach(x=>x.classList.toggle('active',x.dataset.type===t));
    if(playing){audioEl.src=urlFor(type);audioEl.volume=targetVol;const p=audioEl.play();if(p&&p.catch)p.catch(()=>{});}
    setSession(playing?'playing':'paused');
  }
  function skip(d){const i=ORDER.indexOf(type);setType(ORDER[(i+d+ORDER.length)%ORDER.length]);}

  function setAH(a,fn){if('mediaSession' in navigator){try{navigator.mediaSession.setActionHandler(a,fn);}catch(e){}}}
  setAH('play',()=>{if(!playing)start();});
  setAH('pause',()=>{if(playing)stop(false);});
  setAH('nexttrack',()=>skip(1));
  setAH('previoustrack',()=>skip(-1));

  function clearTimer(){if(timerId)clearTimeout(timerId);if(tickId)clearInterval(tickId);timerId=tickId=null;timerEnd=0;document.querySelectorAll('.left').forEach(el=>el.textContent='');}
  function setTimer(min){clearTimer();document.querySelectorAll('.timer').forEach(t=>t.classList.toggle('active',+t.dataset.min===min));
    if(min===0)return;if(!playing)start();timerEnd=Date.now()+min*60000;timerId=setTimeout(()=>{stop(true);resetTimerUI();},min*60000);
    const slot=document.querySelector('.left[data-slot="'+min+'"]');
    tickId=setInterval(()=>{const left=Math.max(0,timerEnd-Date.now());const m=Math.floor(left/60000),s=Math.floor((left%60000)/1000);
      if(slot)slot.textContent=m+':'+String(s).padStart(2,'0');},1000);}
  function resetTimerUI(){document.querySelectorAll('.timer').forEach(t=>t.classList.toggle('active',+t.dataset.min===0));document.querySelectorAll('.left').forEach(el=>el.textContent='');}

  document.getElementById('orb').addEventListener('click',e=>{e.stopPropagation();toggle();});
  document.getElementById('sounds').addEventListener('click',e=>{const b=e.target.closest('.sound');if(!b)return;setType(b.dataset.type);});
  const vol=document.getElementById('vol');
  vol.addEventListener('input',()=>{targetVol=(vol.value/100)*0.9;if(playing&&!fadeTimer)audioEl.volume=targetVol;});
  document.getElementById('timers').addEventListener('click',e=>{const b=e.target.closest('.timer');if(!b)return;setTimer(+b.dataset.min);});

  /* ---------- Focus mode: full-screen pastel colour orbs (no UI, tap to exit) ---------- */
  const fc=document.getElementById('focus'),fx=fc.getContext('2d');
  let focusOn=false,fraf=null,ft0=null,orbs=[],hintTimer=null,fdpr=Math.min(window.devicePixelRatio||1,2);
  function fsize(){fc.width=innerWidth*fdpr;fc.height=innerHeight*fdpr;}
  function initOrbs(){
    orbs=[];const W=fc.width,H=fc.height,base=[12,52,128,178,222,292];
    for(let i=0;i<6;i++){
      orbs.push({hue:base[i],
        ax:W*(0.20+Math.random()*0.18),ay:H*(0.20+Math.random()*0.18),
        sx:0.00010+Math.random()*0.00012,sy:0.00009+Math.random()*0.00011,
        px:Math.random()*6.2832,py:Math.random()*6.2832,
        r:Math.min(W,H)*(0.34+Math.random()*0.18)});
    }
  }
  function fdraw(ts){
    if(!ft0)ft0=ts;const t=ts-ft0,W=fc.width,H=fc.height;
    fx.globalCompositeOperation='source-over';fx.fillStyle='#070611';fx.fillRect(0,0,W,H);
    fx.globalCompositeOperation='lighter';
    const drift=t*0.004;
    for(const o of orbs){
      const x=W/2+Math.sin(t*o.sx+o.px)*o.ax,y=H/2+Math.cos(t*o.sy+o.py)*o.ay,hue=(o.hue+drift)%360;
      const g=fx.createRadialGradient(x,y,0,x,y,o.r);
      g.addColorStop(0,'hsla('+hue+',82%,72%,0.5)');
      g.addColorStop(0.4,'hsla('+hue+',82%,64%,0.16)');
      g.addColorStop(1,'hsla('+hue+',82%,60%,0)');
      fx.fillStyle=g;fx.beginPath();fx.arc(x,y,o.r,0,6.2832);fx.fill();
    }
    fraf=requestAnimationFrame(fdraw);
  }
  function enterFocus(){focusOn=true;document.body.classList.add('focus');document.body.classList.remove('hidehint');
    fsize();initOrbs();ft0=null;if(!fraf)fraf=requestAnimationFrame(fdraw);
    if(hintTimer)clearTimeout(hintTimer);hintTimer=setTimeout(()=>document.body.classList.add('hidehint'),3500);}
  function exitFocus(){focusOn=false;document.body.classList.remove('focus');if(fraf){cancelAnimationFrame(fraf);fraf=null;}}
  window.addEventListener('resize',()=>{if(focusOn){fsize();initOrbs();}});
  const gbtn=document.getElementById('glowbtn');
  gbtn.addEventListener('click',e=>{e.stopPropagation();focusOn?exitFocus():enterFocus();});
  document.getElementById('focus').addEventListener('click',exitFocus);

  const moon=document.getElementById('moon');
  moon.addEventListener('click',e=>{e.stopPropagation();document.body.classList.add('dim');});
  document.getElementById('stage').addEventListener('click',()=>{if(document.body.classList.contains('dim'))document.body.classList.remove('dim');});
  document.querySelector('.dim-tip').addEventListener('click',()=>document.body.classList.remove('dim'));
})();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
